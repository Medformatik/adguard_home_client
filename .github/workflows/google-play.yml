name: Google Play AAB

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: google-play
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & upload AAB to Google Play
    runs-on: ubuntu-latest
    environment: google-play

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Google Play release notes
        id: release-notes
        run: |
          node <<'NODE'
          const fs = require('fs');

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const releaseBody = event.release?.body ?? '';

          function markdownToPlainText(markdown) {
            let text = markdown.replace(/\r\n?/g, '\n');

            text = text.replace(/<!--[\s\S]*?-->/g, '');
            text = text.replace(/^\s{0,3}(```+|~~~+).*$/gm, '');
            text = text.replace(/^\s*\[[^\]]+\]:\s+\S+.*$/gm, '');
            text = text.replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1');
            text = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
            text = text.replace(/\[([^\]]+)\]\[[^\]]*\]/g, '$1');
            text = text.replace(/<((?:https?|mailto):[^>]+)>/g, '$1');
            text = text.replace(/<\/?[^>\n]+>/g, '');
            text = text.replace(/^\s{0,3}#{1,6}\s+/gm, '');
            text = text.replace(/^\s{0,3}>\s?/gm, '');
            text = text.replace(/^\s{0,3}[-*_]{3,}\s*$/gm, '');
            text = text.replace(/^\s*[-*+]\s+\[[ xX]\]\s+/gm, '- ');
            text = text.replace(/^\s*[-*+]\s+/gm, '- ');
            text = text.replace(/`([^`\n]+)`/g, '$1');
            text = text.replace(/\*\*([^*\n]+)\*\*/g, '$1');
            text = text.replace(/__([^_\n]+)__/g, '$1');
            text = text.replace(/\*([^*\n]+)\*/g, '$1');
            text = text.replace(/_([^_\n]+)_/g, '$1');
            text = text.replace(/~~([^~\n]+)~~/g, '$1');
            text = text.replace(/\\([\\`*_{}\[\]()#+\-.!|>])/g, '$1');
            text = text
              .split('\n')
              .map((line) => line.trimEnd())
              .join('\n')
              .replace(/\n{3,}/g, '\n\n')
              .trim();

            return text;
          }

          const releaseNotes = markdownToPlainText(releaseBody);
          const characterCount = Array.from(releaseNotes).length;
          const maxCharacterCount = 500;

          if (!releaseNotes) {
            console.log('No plain-text release notes found. The Google Play release will be uploaded without release notes.');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_release_notes=false\n');
            process.exit(0);
          }

          if (characterCount > maxCharacterCount) {
            console.log(`Plain-text release notes are ${characterCount} characters, which is over Google Play's ${maxCharacterCount}-character limit. The Google Play release will be uploaded without release notes.`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_release_notes=false\n');
            process.exit(0);
          }

          fs.mkdirSync('distribution/whatsnew', { recursive: true });
          fs.writeFileSync('distribution/whatsnew/whatsnew-en-US', `${releaseNotes}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_release_notes=true\n');
          NODE

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=$KEYSTORE_PATH"
          } > android/key.properties

      - name: Pub get
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB to Google Play production draft with release notes
        if: steps.release-notes.outputs.has_release_notes == 'true'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: de.medformatik.adguard_home_client
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: production
          status: draft
          whatsNewDirectory: distribution/whatsnew
          releaseName: ${{ github.event.release.tag_name }}

      - name: Upload AAB to Google Play production draft without release notes
        if: steps.release-notes.outputs.has_release_notes != 'true'
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: de.medformatik.adguard_home_client
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: production
          status: draft
          releaseName: ${{ github.event.release.tag_name }}
