name: adguard_home_client
description: "A remote for AdGuard Home instances."

publish_to: "none"

version: 2.1.0+5

environment:
  sdk: ^3.12.2

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  dynamic_system_colors: ^1.9.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  http: ^1.6.0
  intl: ^0.20.3
  json_annotation: ^4.12.0
  retrofit: ^4.9.2

dev_dependencies:
  build_runner: ^2.15.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  retrofit_generator: ^10.2.7
  swagger_parser: ^1.44.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon/app_icon.png"
  adaptive_icon_foreground: "assets/images/icon/app_icon_adaptive.png"
  adaptive_icon_background: "assets/images/icon/app_icon_adaptive.png"
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
