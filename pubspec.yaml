name: adguard_home_client
description: "A remote for AdGuard Home instances."

publish_to: "none"

version: 2.0.1+4

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  fluttertoast: ^9.0.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  http: ^1.6.0
  intl: ^0.20.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon/app_icon.png"
  adaptive_icon_foreground: "assets/images/icon/app_icon_adaptive.png"
  adaptive_icon_background: "assets/images/icon/app_icon_adaptive.png"
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
